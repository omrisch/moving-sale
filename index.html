<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moving Sale</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <a class="nav-link" id="infoLink" href="info.html">Pickup info</a>
  <div class="lang-toggle" id="langToggle">
    <button data-lang="en">EN</button>
    <button data-lang="he">עברית</button>
  </div>
  <h1 id="title">Moving Sale</h1>
  <p id="subtitle">Everything must go. Message us for anything you'd like.</p>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="controls">
      <input type="search" id="search" placeholder="Search items...">
    </div>
    <div class="controls filters" id="statusFilters"></div>
    <div class="controls filters" id="categoryFilters"></div>
    <div class="controls filters" id="roomFilters"></div>
    <div class="controls price-range">
      <span id="priceLabel">Price (₪):</span>
      <input type="number" id="priceMin" min="0">
      <span>&ndash;</span>
      <input type="number" id="priceMax" min="0">
    </div>
    <div class="controls price-range">
      <span id="dateLabel">Available by:</span>
      <input type="date" id="dateMax">
    </div>
    <div class="controls price-range">
      <span id="sortLabel">Sort:</span>
      <select id="sortSelect">
        <option value="default" id="sortDefault">Default</option>
        <option value="name" id="sortName">Name (A→Z)</option>
        <option value="date" id="sortDate">Date (soonest)</option>
        <option value="room" id="sortRoom">Room (A→Z)</option>
      </select>
    </div>
  </aside>
  <main class="content">
    <div id="loading"><div class="spinner"></div><span id="loadingText">Loading items…</span></div>
    <div id="error" style="display:none">Couldn't load the list. Check the SHEET_CSV_URL in index.html.</div>
    <div id="empty" style="display:none">No items match.</div>
    <div id="grid"></div>
    <div id="scrollSentinel"></div>
  </main>
</div>
<dialog id="imgDialog"><img id="imgDialogPhoto" alt=""></dialog>

<script>
// ponytail: Google Sheet published-to-web CSV is the entire database. No backend.
// Set up: File > Share > Publish to web > choose the sheet tab > CSV > copy link.
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQAxZWivvHSeibbno0Yd1JLYMfrIfKNCkxnhjeIXd_iDPEgvLwucRUJLi5DniibgYvERiq6KUcoH3jX/pub?gid=0&single=true&output=csv";

// WhatsApp number (with country code, no + or spaces) that "Message on WhatsApp" links to.
const WHATSAPP_NUMBER = "9720585518225";

const STATUSES = ["For Sale", "Free", "Available Soon", "Sold", "Given Away"];

// ponytail: fixed UI vocab is translated by hand here. Free-text item data (Item/Category/Description)
// is translated by adding "Item (HE)" / "Category (HE)" / "Description (HE)" columns in the Sheet —
// no translation API, no dependency, never breaks.
const I18N = {
  en: {
    dir: "rtl-off",
    title: "Moving Sale",
    subtitle: "Everything must go. Message us for anything you'd like.",
    searchPlaceholder: "Search items...",
    priceLabel: "Price (₪):",
    loading: "Loading items…",
    error: "Couldn't load the list. Check the SHEET_CSV_URL in index.html.",
    empty: "No items match.",
    freePrice: "Free",
    whatsapp: "Message on WhatsApp",
    infoLink: "Pickup info",
    allStatuses: "All statuses",
    allCategories: "All categories",
    allRooms: "All rooms",
    statusLabel: { "For Sale": "For Sale", "Free": "Free", "Available Soon": "Available Soon", "Sold": "Sold", "Given Away": "Given Away" },
    availableFrom: date => `Available from ${date}`,
    dateLabel: "Available by:",
    sortLabel: "Sort:",
    sortDefault: "Default",
    sortName: "Name (A→Z)",
    sortDate: "Date (soonest)",
    sortRoom: "Room (A→Z)",
    linkToItem: "More info",
    waMessage: (name, priceText) => `Hi! I'm interested in "${name}"${priceText ? ` (${priceText})` : ""} from the moving sale. Is it still available?`,
  },
  he: {
    dir: "rtl",
    title: "מכירת מעבר דירה",
    subtitle: "הכול צריך לצאת מהבית. תכתבו לנו על מה שמעניין אתכם.",
    searchPlaceholder: "חיפוש פריטים...",
    priceLabel: "מחיר (₪):",
    loading: "טוען פריטים…",
    error: "טעינת הרשימה נכשלה. בדקו את SHEET_CSV_URL בקובץ.",
    empty: "לא נמצאו פריטים מתאימים.",
    freePrice: "ללא תשלום",
    whatsapp: "שליחת הודעה בוואטסאפ",
    infoLink: "מידע על איסוף",
    allStatuses: "כל הסטטוסים",
    allCategories: "כל הקטגוריות",
    allRooms: "כל החדרים",
    statusLabel: { "For Sale": "למכירה", "Free": "ללא תשלום", "Available Soon": "בקרוב", "Sold": "נמכר", "Given Away": "נמסר" },
    availableFrom: date => `זמין החל מ-${date}`,
    dateLabel: "זמין עד תאריך:",
    sortLabel: "מיון:",
    sortDefault: "ברירת מחדל",
    sortName: "שם (א-ת)",
    sortDate: "תאריך (הקרוב ביותר)",
    sortRoom: "חדר (א-ת)",
    linkToItem: "מידע נוסף",
    waMessage: (name, priceText) => `היי! מתעניין/ת ב"${name}"${priceText ? ` (${priceText})` : ""} ממכירת המעבר. זה עדיין קיים?`,
  },
};

function parseCSV(text) {
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ""; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && text[i + 1] === '\n') i++;
        row.push(field); field = "";
        if (row.length > 1 || row[0] !== "") rows.push(row);
        row = [];
      } else field += c;
    }
  }
  if (field !== "" || row.length) { row.push(field); rows.push(row); }
  if (!rows.length) return [];
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).filter(r => r.some(v => v.trim() !== "")).map(r => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = (r[i] || "").trim());
    return obj;
  });
}

// ponytail: hand-rolled fuzzy match (subsequence match per query word) instead of a fuzzy-search library
function isSubsequence(needle, haystack) {
  let i = 0;
  for (let j = 0; j < haystack.length && i < needle.length; j++) {
    if (haystack[j] === needle[i]) i++;
  }
  return i === needle.length;
}
// Each query word must be a subsequence of a single haystack token (not spanning across words) —
// matching against the whole concatenated haystack let letters from unrelated adjacent fields
// (and long URLs) accidentally line up into false positives.
function fuzzyMatch(query, text) {
  const words = query.toLowerCase().trim().split(/\s+/).filter(Boolean);
  if (!words.length) return true;
  const tokens = text.toLowerCase().split(/\s+/).filter(Boolean);
  return words.every(w => tokens.some(tok => isSubsequence(w, tok)));
}

// (HE) columns are often filled via a live GOOGLETRANSLATE() formula in the sheet — while it's still
// resolving (or on a translation error), the cell can hold literal "Loading..." or "#VALUE!"/"#N/A"
// instead of real text. Treat those as absent so buyers never see the raw formula state.
function isTranslatePlaceholder(v) {
  return !v || v === "Loading..." || /^#[A-Z/]+!?$/.test(v);
}

// Displayed text for an item field: falls back to the English column if no "(HE)" translation is filled in.
function localField(it, lang, field) {
  if (lang === "he") {
    const he = it[`${field} (HE)`];
    if (!isTranslatePlaceholder(he)) return he;
  }
  return it[field] || "";
}

// Strips a trailing product URL out of Description text before it's used as search haystack —
// otherwise the subsequence fuzzy matcher below spuriously matches short queries against the long
// URL itself (e.g. "guitar" is a subsequence of almost any 80-char URL).
function stripUrl(desc) {
  return desc.replace(/https?:\/\/\S+/g, "");
}

// Description free text may end with a plain URL (original retailer link, pasted from research) —
// show it as a "Link to item" hyperlink instead of the raw URL string.
function formatDescription(desc, lang) {
  const match = desc.match(/https?:\/\/\S+/);
  if (!match) return desc;
  const url = match[0];
  const before = desc.slice(0, match.index).trim();
  const link = `<a href="${url}" target="_blank" rel="noopener">${I18N[lang].linkToItem}</a>`;
  return before ? `${before} — ${link}` : link;
}

function whatsappLink(it, lang) {
  const t = I18N[lang];
  const name = localField(it, lang, "Item");
  const priceText = it.Status === "Free" ? t.freePrice : (it.Price ? `₪${it.Price}` : "");
  const msg = t.waMessage(name, priceText);
  return `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
}

// ponytail: Date column is free text; parsed with new Date() so ISO ("2026-08-01") sorts/filters
// reliably. Unparseable or blank dates just opt the item out of date filtering/badges/sort-to-top.
// Sorting/filtering always uses the English Date column — "Date (HE)" is display-only.
function parseItemDate(it) {
  if (!it.Date) return null;
  const d = new Date(it.Date);
  return isNaN(d.getTime()) ? null : d;
}

// Optional "Status (HE)"/"Date (HE)" columns override the fixed I18N status label / raw date
// string for Hebrew display, same fallback-to-English pattern as localField().
function localStatus(it, lang) {
  if (lang === "he" && !isTranslatePlaceholder(it["Status (HE)"])) return it["Status (HE)"];
  return I18N[lang].statusLabel[it.Status] || it.Status || "";
}
function localDate(it, lang) {
  if (lang === "he" && !isTranslatePlaceholder(it["Date (HE)"])) return it["Date (HE)"];
  return it.Date;
}

// ponytail: render in batches on scroll instead of all ~50 cards (+ their images) at once
const BATCH_SIZE = 8;
const renderState = { filtered: [], shown: 0, lang: "en" };

function buildCard(it, lang) {
  const t = I18N[lang];
  const claimed = it.Status === "Sold" || it.Status === "Given Away";
  const card = document.createElement("div");
  card.className = "card" + (claimed ? " claimed" : "");
  const statusClass = it.Status.toLowerCase().replace(/\s+/g, "-");
  const name = localField(it, lang, "Item") || "Untitled";
  const category = localField(it, lang, "Category");
  const description = localField(it, lang, "Description");
  card.innerHTML = `
    ${it["Photo URL"] ? `<img src="${it["Photo URL"]}" alt="${name}" loading="lazy" class="thumb">` : ""}
    <div class="body">
      <h3>${name}</h3>
      ${category ? `<div class="cat">${category}</div>` : ""}
      ${description ? `<div class="desc">${formatDescription(description, lang)}</div>` : ""}
      <div class="row">
        <span class="price">${it.Status === "Free" ? t.freePrice : (it.Price ? "₪" + it.Price : "")}</span>
        ${it.Status === "Available Soon" && it.Date ? "" : `<span class="badge ${statusClass}">${localStatus(it, lang)}</span>`}
      </div>
      ${it.Date ? `<span class="badge available-soon">${t.availableFrom(localDate(it, lang))}</span>` : ""}
      ${claimed ? "" : `<a class="wa-btn" href="${whatsappLink(it, lang)}" target="_blank" rel="noopener">${t.whatsapp}</a>`}
    </div>`;
  return card;
}

function appendBatch() {
  const grid = document.getElementById("grid");
  const next = renderState.filtered.slice(renderState.shown, renderState.shown + BATCH_SIZE);
  next.forEach(it => grid.appendChild(buildCard(it, renderState.lang)));
  renderState.shown += next.length;
}

function render(items, filters, lang) {
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  const min = filters.priceMin === "" ? null : parseFloat(filters.priceMin);
  const max = filters.priceMax === "" ? null : parseFloat(filters.priceMax);
  const dateMax = filters.dateMax ? new Date(filters.dateMax) : null;
  const filtered = items.filter(it => {
    if (filters.status !== "All" && it.Status !== filters.status) return false;
    if (filters.category !== "All" && it.Category !== filters.category) return false;
    if (filters.room !== "All" && it.Room !== filters.room) return false;
    if (min !== null || max !== null) {
      const price = parseFloat(it.Price);
      if (isNaN(price)) return false;
      if (min !== null && price < min) return false;
      if (max !== null && price > max) return false;
    }
    if (dateMax) {
      const itemDate = parseItemDate(it);
      if (itemDate && itemDate > dateMax) return false;
    }
    if (!fuzzyMatch(filters.query, `${it.Item} ${it.Category} ${stripUrl(it.Description)} ${localField(it, lang, "Item")} ${localField(it, lang, "Category")} ${stripUrl(localField(it, lang, "Description"))}`)) return false;
    return true;
  });
  if (filters.sort === "name") {
    filtered.sort((a, b) => localField(a, lang, "Item").localeCompare(localField(b, lang, "Item")));
  } else if (filters.sort === "date") {
    // No date = already available now, so it sorts first (soonest), not last.
    filtered.sort((a, b) => (parseItemDate(a)?.getTime() ?? -Infinity) - (parseItemDate(b)?.getTime() ?? -Infinity));
  } else if (filters.sort === "room") {
    filtered.sort((a, b) => (a.Room || "").localeCompare(b.Room || ""));
  }
  grid.innerHTML = "";
  empty.style.display = filtered.length ? "none" : "block";
  renderState.filtered = filtered;
  renderState.shown = 0;
  renderState.lang = lang;
  appendBatch();
}

new IntersectionObserver(entries => {
  if (entries[0].isIntersecting && renderState.shown < renderState.filtered.length) appendBatch();
}, { rootMargin: "300px" }).observe(document.getElementById("scrollSentinel"));

// Click a card's photo to open it enlarged in a native <dialog>; click anywhere to close.
document.getElementById("grid").addEventListener("click", e => {
  if (e.target.classList.contains("thumb")) {
    document.getElementById("imgDialogPhoto").src = e.target.src;
    document.getElementById("imgDialog").showModal();
    return;
  }
  // ponytail: global cooldown, not per-button — deters rapid repeat WhatsApp clicks, not real spam
  if (e.target.classList.contains("wa-btn")) {
    const now = Date.now();
    if (now - lastWaClick < WA_COOLDOWN_MS) { e.preventDefault(); return; }
    lastWaClick = now;
  }
});
let lastWaClick = 0;
const WA_COOLDOWN_MS = 3000;
document.getElementById("imgDialog").addEventListener("click", e => e.currentTarget.close());

function buildFilterBar(containerId, allLabel, values, counts, labelFor, onChange) {
  const bar = document.getElementById(containerId);
  bar.innerHTML = "";
  let active = "All";
  ["All", ...values].forEach(value => {
    if (value !== "All" && !counts[value]) return;
    const btn = document.createElement("button");
    btn.textContent = value === "All" ? `${allLabel} (${counts.All})` : `${labelFor(value)} (${counts[value]})`;
    if (value === "All") btn.classList.add("active");
    btn.onclick = () => {
      active = value;
      [...bar.children].forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      onChange(active);
    };
    bar.appendChild(btn);
  });
  return () => active;
}

async function init() {
  const loading = document.getElementById("loading");
  const error = document.getElementById("error");
  const search = document.getElementById("search");
  const priceMin = document.getElementById("priceMin");
  const priceMax = document.getElementById("priceMax");
  const dateMax = document.getElementById("dateMax");
  const sortSelect = document.getElementById("sortSelect");

  let lang = localStorage.getItem("moving-sale-lang") || "en";

  function applyStaticText() {
    const t = I18N[lang];
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === "he" ? "rtl" : "ltr";
    document.getElementById("title").textContent = t.title;
    document.getElementById("subtitle").textContent = t.subtitle;
    search.placeholder = t.searchPlaceholder;
    document.getElementById("priceLabel").textContent = t.priceLabel;
    document.getElementById("dateLabel").textContent = t.dateLabel;
    document.getElementById("sortLabel").textContent = t.sortLabel;
    document.getElementById("sortDefault").textContent = t.sortDefault;
    document.getElementById("sortName").textContent = t.sortName;
    document.getElementById("sortDate").textContent = t.sortDate;
    document.getElementById("sortRoom").textContent = t.sortRoom;
    document.getElementById("infoLink").textContent = t.infoLink;
    document.getElementById("loadingText").textContent = t.loading;
    error.textContent = t.error;
    document.getElementById("empty").textContent = t.empty;
    [...document.querySelectorAll("#langToggle button")].forEach(b =>
      b.classList.toggle("active", b.dataset.lang === lang));
  }
  applyStaticText();

  try {
    const res = await fetch(SHEET_CSV_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("bad response");
    // "Inactive" items are hidden entirely — not counted, not filterable, not rendered.
    const items = parseCSV(await res.text()).filter(it => it.Status !== "Inactive" && it.Item);
    loading.style.display = "none";

    const statusCounts = { All: items.length };
    STATUSES.forEach(s => statusCounts[s] = items.filter(i => i.Status === s).length);
    const categories = [...new Set(items.map(i => i.Category).filter(Boolean))].sort();
    const categoryCounts = { All: items.length };
    categories.forEach(c => categoryCounts[c] = items.filter(i => i.Category === c).length);
    const rooms = [...new Set(items.map(i => i.Room).filter(Boolean))].sort();
    const roomCounts = { All: items.length };
    rooms.forEach(r => roomCounts[r] = items.filter(i => i.Room === r).length);
    // Category filter buttons show the (HE) translation from the first item that has one, English otherwise.
    const categoryLabel = c => {
      const t = I18N[lang];
      if (lang !== "he") return c;
      const withHe = items.find(i => i.Category === c && i["Category (HE)"]);
      return withHe ? withHe["Category (HE)"] : c;
    };

    let getStatus = () => "All";
    let getCategory = () => "All";
    let getRoom = () => "All";
    const rerender = () => render(items, {
      status: getStatus(),
      category: getCategory(),
      room: getRoom(),
      query: search.value,
      priceMin: priceMin.value,
      priceMax: priceMax.value,
      dateMax: dateMax.value,
      sort: sortSelect.value,
    }, lang);

    function rebuildFilters() {
      const t = I18N[lang];
      const prevStatus = getStatus ? getStatus() : "All";
      const prevCategory = getCategory ? getCategory() : "All";
      const prevRoom = getRoom ? getRoom() : "All";
      getStatus = buildFilterBar("statusFilters", t.allStatuses, STATUSES, statusCounts, s => t.statusLabel[s] || s, rerender);
      getCategory = buildFilterBar("categoryFilters", t.allCategories, categories, categoryCounts, categoryLabel, rerender);
      getRoom = buildFilterBar("roomFilters", t.allRooms, rooms, roomCounts, r => r, rerender);
      rerender();
    }
    rebuildFilters();

    search.oninput = rerender;
    priceMin.oninput = rerender;
    priceMax.oninput = rerender;
    dateMax.oninput = rerender;
    sortSelect.onchange = rerender;

    document.getElementById("langToggle").onclick = (e) => {
      const btn = e.target.closest("button[data-lang]");
      if (!btn || btn.dataset.lang === lang) return;
      lang = btn.dataset.lang;
      localStorage.setItem("moving-sale-lang", lang);
      applyStaticText();
      rebuildFilters();
    };
  } catch (e) {
    loading.style.display = "none";
    error.style.display = "block";
    console.error(e);
  }
}

// ponytail: smallest self-check for the hand-rolled CSV parser (no test framework needed)
(function selfTestParseCSV() {
  const sample = 'Item,Price\n"Desk, Oak",50\n"Lamp ""tall""",10\n';
  const out = parseCSV(sample);
  console.assert(out.length === 2, "parseCSV: expected 2 rows", out);
  console.assert(out[0].Item === "Desk, Oak" && out[0].Price === "50", "parseCSV: quoted comma failed", out[0]);
  console.assert(out[1].Item === 'Lamp "tall"', "parseCSV: escaped quote failed", out[1]);
})();

(function selfTestFuzzyMatch() {
  console.assert(fuzzyMatch("dsk oak", "Desk, Oak table") === true, "fuzzyMatch: subsequence should match");
  console.assert(fuzzyMatch("lamp", "Dutch Oven") === false, "fuzzyMatch: unrelated text should not match");
  console.assert(fuzzyMatch("", "anything") === true, "fuzzyMatch: empty query matches everything");
})();

(function selfTestLocalField() {
  const withHe = { Item: "Lamp", "Item (HE)": "מנורה" };
  const withoutHe = { Item: "Chair" };
  console.assert(localField(withHe, "he", "Item") === "מנורה", "localField: should prefer HE column");
  console.assert(localField(withoutHe, "he", "Item") === "Chair", "localField: should fall back to English");
  console.assert(localField(withHe, "en", "Item") === "Lamp", "localField: English lang should ignore HE column");
})();

init();
</script>
</body>
</html>
